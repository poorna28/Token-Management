<!DOCTYPE html>
<html lang="en">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token Admin Manager</title>
    <link rel="icon" href="images/favicon.ico">
    <link rel="stylesheet" href="icon-fonts/styles.css">
    <link rel="stylesheet" href="css/bootstrap-min.css">
    <!-- <link rel="stylesheet" href="css/admin-dashboard.css" /> -->
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/bootstrap-icons.css">
    <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"> -->


    <script src="js/bootstrap.bundle-min.js"></script>
    <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script> -->
    <script src="js/jquery-min.js"></script>

    <link rel="stylesheet" href="css/dataTables-min.css">
    <!-- <link rel="stylesheet" href="https://cdn.datatables.net/2.3.5/css/dataTables.dataTables.min.css"> -->
    <script src="jquery/jquery-min.js"></script>
    <!-- <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script> -->

    <script src="js/dataTables-min.js"></script>
    <!-- <script src="https://cdn.datatables.net/2.3.5/js/dataTables.min.js"></script> -->

</head>





<body>
    <div id="loader" style="display: none;">
        <div class="loader-img">
            <img src="./images/loader.gif" alt="Loading...">
        </div>
    </div>


    <header class="zc-header d-flex align-items-center justify-content-between">

        <!-- Left Section -->
        <div class="zc-header-left d-flex align-items-center">
            <div class="toggle-width"></div>

            <a class="zc-logo" href="#">
                <img alt="Logo" src="images/logo.png">
            </a>

            <div class="header-title d-flex flex-column">
                <!-- <h3>Apollo Hospitals</h3>
                <p id=""></p> -->
            </div>
        </div>
        <h2 class="table-title">
            APOLLO TOKEN MANAGEMENT
        </h2>

        <div class=" d-flex align-items-center p-0">
            <img height="25px" src="images/Locations.svg" alt="" class="me-2" style="color: white;">
            <select id="location-dropdown" class="location-dropdown"></select>
        </div>

        </div>


    </header>



    <!-- MAIN CONTENT -->
    <main class="main-content admin-main">
        <h2 class="section-title">Token Admin Manager</h2>

        <!-- STAT CARDS -->
        <div class="stat-cards">
            <div class="stat-card total">
                <div class="stat-icon">
                    <img src="images/Token icon .svg" alt="Total Tokens">
                </div>
                <div class="stat-info">
                    <span class="stat-label">Total Tokens</span>
                    <span class="stat-value">120</span>
                </div>
            </div>
            <div class="stat-card billing">
                <div class="stat-icon">
                    <img src="images/Billing.svg" alt="Billing Tokens">
                </div>
                <div class="stat-info">
                    <span class="stat-label billing-lbl">Billing</span>
                    <span class="stat-value billing-val">22</span>
                </div>
            </div>


            <div class="stat-card picking">
                <div class="stat-icon">
                    <img src="images/Picking.svg" alt="Picking Tokens">
                </div>
                <div class="stat-info">
                    <span class="stat-label picking-lbl">Picking</span>
                    <span class="stat-value picking-val">12</span>
                </div>
            </div>

            <div class="stat-card packing">
                <div class="stat-icon">
                    <img src="images/Packing.svg" alt="Packing Tokens">
                </div>
                <div class="stat-info">
                    <span class="stat-label packing-lbl">Packing</span>
                    <span class="stat-value packing-val">75</span>
                </div>
            </div>

            <div class="stat-card ready">
                <div class="stat-icon">
                    <img src="images/Ready to Deliver.svg" alt="Ready Tokens">
                </div>
                <div class="stat-info">
                    <span class="stat-label ready-lbl">Ready to Deliver</span>
                    <span class="stat-value ready-val">45</span>
                </div>
            </div>

            <div class="stat-card delivered">
                <div class="stat-icon">
                    <img src="images/Delivered.svg" alt="Delivered Tokens">
                </div>
                <div class="stat-info">
                    <span class="stat-label">Delivered</span>
                    <span class="stat-value">30</span>
                </div>
            </div>


            <div class="stat-card cancelled">
                <div class="stat-icon">
                    <img src="images/Delivered.svg" alt="Delivered Tokens">
                </div>
                <div class="stat-info">
                    <span class="stat-label">Cancelled</span>
                    <span class="stat-value">30</span>
                </div>
            </div>



            <div class="stat-card breach">
                <div class="stat-icon">
                    <img src="images/Breach.svg" alt="Breach Tokens">
                </div>
                <div class="stat-info">
                    <span class="stat-label breach-lbl">Breached</span>
                    <span class="stat-value breach-val">14</span>
                </div>
            </div>
        </div>

        <div id="tokenSectionWrapper" class="token-section-wrapper">
            <div class="token-list">
                <!-- <div class="filter-sub">
                    <div id="applyFilter" class="filters">
                        <button class="btn"><i class="bi bi-file-earmark-text-fill me-2"></i>Filter</button>
                    </div>
                </div> -->
                <div class="filter-sub">
                    <span class="fronDate">From Date:</span> <input type="date" id="fromDateInput" class="form-control "
                        style="cursor: pointer;" />
                    <span class="fronDate">To Date:</span> <input type="date" id="toDateInput" class="form-control"
                        style="cursor: pointer;" />

                    <div id="applyFilter" class="filters">
                        <button id="applyDateFilter" class="btn filter-btn btn-success">
                            <i class="bi bi-file-earmark-text-fill"></i>
                            <span>APPLY</span>
                        </button>
                    </div>
                    <div class="filters">
                        <button id="clearDateFilter" class="btn filter-btn btn-danger">
                            <i class="bi bi-eraser-fill"></i>
                            <span>CLEAR</span>
                        </button>
                    </div>
                </div>
                <h4 class="token-list-heading">Total Token List</h4>
                <table id="tokenAdminTable" class="display admin-dash-table" style="width:100%">
                    <thead>
                        <tr>
                            <th style="text-align: center;">Customer</th>
                            <th>Token ID</th>
                            <th>Location</th>
                            <th>Current stage</th>
                            <th>Issue Time</th>
                            <th>Exit Time</th>
                            <th>Counter No</th>
                            <th>TAT Limit(Mins)</th>
                            <th>TAT Breach(Mins)</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="js/admin-dashboard.js"></script>
</body>

</html>
